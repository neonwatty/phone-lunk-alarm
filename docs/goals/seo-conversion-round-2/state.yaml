  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map the current origin/main implementation state against the round-2 audit findings and identify the safest first implementation package."
    inputs:
      - "origin/main at or after c02243b"
      - "Prior subagent audit findings summarized in goal intake."
      - "README.md, package.json, app routes, lib/seo.ts, analytics components, tests, deploy scripts/workflows."
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Account for local main divergence before recommending a write path."
      - "Prefer concrete file-path evidence and verification commands over generic advice."
    expected_output:
      - "Current-state map for measurement, lead capture, content depth, and deploy/SEO hygiene."
      - "Ranked candidate implementation packages."
      - "Recommended first package with risk notes."
      - "Any required owner input or external credentials."
    receipt:
      result: done
      summary: "origin/main is PR #20 c02243b and local main diverges, so implementation should branch/worktree from origin/main. Current state has generic analytics only, mailto pilot capture, shallow SEO guide pages, reusable CTA not wired on pages inspected, and deploy/SEO hygiene gaps around theme-color, hardcoded URLs, apex/www mismatch, and limited deployment/CI coverage. Safest first package is measurement plus CTA instrumentation because it is local, credential-free, and unlocks later lead/form/content validation."
      evidence:
        - "git status shows local main...origin/main [ahead 2, behind 1]; origin/main resolves to c02243b SEO growth pass for Phone Lunk (#20)."
        - "app/layout.tsx imports Vercel Analytics/Speed Insights and injects GTM/GA, but no custom funnel event helper exists under app/components/lib."
        - "app/waitlist/page.tsx uses a mailto pilot CTA; no form component, API route, or provider config exists."
        - "components/CTA.tsx exists but app/page.tsx does not render it."
        - "components/PhoneDetector.tsx and components/RecordingPreviewModal.tsx implement demo/record/share/download interactions without named event tracking."
        - "app/gym-phone-policy/page.tsx and app/gym-equipment-hogging/page.tsx are useful but shallow three-section pages; /phone-use-at-gym is absent from app routes and lib/seo.ts."
