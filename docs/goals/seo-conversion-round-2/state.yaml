        - "1. Add privacy-preserving funnel event helper and instrument CTA/demo/record/share/download/copy paths, with tests."
        - "2. Replace mailto waitlist with a measurable pilot lead form and credential-free fallback."
        - "3. Wire reusable CTA and post-demo/post-guide CTA coverage."
        - "4. Add /phone-use-at-gym hub and deepen gym policy/equipment-hogging content."
        - "5. Fix deploy/SEO hygiene: theme-color, site URL config, basePath-safe assets, deployment checks, and broader CI e2e."
