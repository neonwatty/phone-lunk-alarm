# GoalBuddy v2 state.yaml
version: 2

goal:
  title: "Phone Lunk SEO Conversion Round 2"
  slug: "seo-conversion-round-2"
  kind: existing_plan
  tranche: "Complete successive safe verified slices that turn the merged SEO foundation into a measurable, conversion-oriented, content-deeper site."
  status: done
  oracle:
    signal: "A final receipt-backed audit shows the site has measurable funnel events, a real pilot-lead capture path, stronger CTAs/internal links, deeper gym-phone SEO content, and passing local verification from the agreed command set."
    cadence: "after each Worker package and at final audit"
    final_proof: "Done receipts for implementation slices plus passing lint, type-check, tests/build as applicable, sitemap/metadata checks for affected pages, and a final Judge/PM audit with full_outcome_complete: true."
  intake:
    original_request: "Plan out another SEO/spiff-up round and prepare it with GoalBuddy."
    interpreted_outcome: "Prepare a GoalBuddy board for the second Phone Lunk organic growth pass focused on measurement, conversion, content depth, and deploy/SEO hygiene."
    input_shape: existing_plan
    audience: "Gym owners/operators, gym members searching phone etiquette topics, and the project owner."
    authority: approved
    proof_type: review
    completion_proof: "A reviewed PR or equivalent local branch implements the prioritized round-2 tranche, passes verification, and maps back to the audit findings."
    likely_misfire: "Spending the round only adding more SEO pages or copy while leaving leads unmeasured, CTAs weak, CI/deploy checks stale, or local main divergence unmanaged."
    blind_spots_considered:
      - "Local main is currently divergent from origin/main; implementation should start from origin/main or an isolated worktree/branch."
      - "Static export and GitHub Pages basePath behavior can regress if hardcoded root assets remain."
      - "Lead capture may require provider credentials; local fallback must still be measurable or clearly blocked."
      - "Content expansion should stay useful and specific, not become thin SEO filler."
      - "Analytics should respect current privacy posture and avoid brittle direct vendor coupling."
    existing_plan_facts:
      - "Round 1 merged as PR #20 at origin/main c02243b."
      - "Recommended Round 2 theme: Measurement, Leads, and Content Depth."
      - "Prioritized work: funnel event tracking, real pilot form, post-demo/post-guide CTAs, expand gym phone policy and equipment hogging content, add a phone-use-at-gym hub, fix deployment checks/theme-color and broaden CI coverage."
      - "Technical audit found basePath/manifest/image hardcoding, deploy workflow apex/www mismatch, incomplete SEO deployment tests, missing theme-color, and limited schema coverage."
      - "Conversion audit found mailto-only waitlist, no custom funnel events, unused reusable CTA, harsh demo copy, and hidden recording/share growth loop."
      - "Engineering audit found passing local verification before merge, noisy tests, incomplete CI e2e scope, dependency audit risk, and repeated site URL configuration."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/seo-conversion-round-2/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/phone-lunk-alarm/docs/goals/seo-conversion-round-2"

active_task: null

